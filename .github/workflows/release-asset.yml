name: Release Asset

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Write version.txt
        run: echo "${{ github.event.release.tag_name }}" > version.txt

      - name: Create release zip
        run: |
          zip kaye-budget-mgmt.zip \
            app.py \
            sheets.py \
            requirements.txt \
            launch.bat \
            splash.py \
            icon.png \
            launch.ico \
            version.txt \
            config.template.json
          zip -r kaye-budget-mgmt.zip static/

      - name: Upload release asset
        run: gh release upload "${{ github.event.release.tag_name }}" kaye-budget-mgmt.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
