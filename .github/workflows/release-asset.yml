name: Release Asset

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Write version.txt
        run: echo "${{ github.event.release.tag_name }}" > version.txt

      - name: Create release zip
        run: |
          zip -r kaye-budget-mgmt.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude ".claude/*" \
            --exclude "node_modules/*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude ".gitignore" \
            --exclude ".gitattributes"

      - name: Upload release asset
        run: gh release upload "${{ github.event.release.tag_name }}" kaye-budget-mgmt.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
